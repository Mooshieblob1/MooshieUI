name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: MooshieUI ${{ github.event.inputs.tag || github.ref_name }}
          releaseBody: |
            ## MooshieUI ${{ github.event.inputs.tag || github.ref_name }}

            **One-click installer** — just download and run. The app will automatically install ComfyUI, Python, PyTorch, and everything else you need on first launch.

            ### Downloads
            | Platform | File |
            |----------|------|
            | **Windows** | `.msi` or `.exe` |
            | **Linux** | `.deb` or `.AppImage` |

            ### What's New in v0.2.4

            - **Model Hub** — browse and download CivitAI models with image previews, ratings, and tags directly in the app. NSFW content filtering with blurred badges. Guided API key setup for gated models. Expanded base model filters including NoobAI, Pony, Illustrious, SD 3.5, Flux, and more. Also accepts direct HuggingFace download URLs.
            - **SwarmUI metadata format** — image metadata is now embedded as SwarmUI-compatible JSON (`sui_image_params`), readable by SwarmUI and other tools. Lightbox metadata panel is now a resizable side panel. Still reads legacy A1111 metadata from older images.
            - **ModelSpec support** — reads Stability AI ModelSpec metadata from `.safetensors` headers and displays model title, author, architecture, resolution, trigger phrases (click to add to prompt), tags, and usage hints in the model selector.
            - **Native clipboard** — image copy now uses native OS clipboard tools (Wayland `wl-copy` / X11 `xclip`) with automatic session detection, fixing clipboard issues on Linux.
            - **Gallery scroll performance** — eliminated scrolling lag in large galleries using requestAnimationFrame throttling and CSS containment.
            - **Metadata fixes** — seed no longer shows -1 (resolved seed is now returned from generation); denoise is no longer incorrectly included in txt2img metadata.
            - **Preview image actions** — Save and Copy buttons on the preview image now use the saved gallery file instead of the preview blob.
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
