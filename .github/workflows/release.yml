name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: MooshieUI ${{ github.event.inputs.tag || github.ref_name }}
          releaseBody: |
            ## MooshieUI ${{ github.event.inputs.tag || github.ref_name }}

            **One-click installer** — just download and run. The app will automatically install ComfyUI, Python, PyTorch, and everything else you need on first launch.

            ### Downloads
            | Platform | File |
            |----------|------|
            | **Windows** | `.msi` or `.exe` |
            | **macOS (Apple Silicon)** | `.dmg` (aarch64) |
            | **macOS (Intel)** | `.dmg` (x64) |
            | **Linux** | `.deb` or `.AppImage` |

            ### What's New in v0.2.3

            - **Tier 1 feature batch completed:** drag & drop image/mask inputs, PNG metadata embed + read + apply, prompt history/favorites, model-aware defaults, and queue management page.
            - **Style presets are now optional:** added a settings toggle so Fooocus-style presets are disabled by default and can be enabled when desired.
            - **Gallery Boards/Organization:** assign images to named boards, filter/group by board, and manage boards directly in gallery/lightbox flows.
            - **Shared model directory support:** point MooshieUI to an external/shared models folder (via extra model paths config) to avoid duplicate downloads.
            - **Expanded parameter help coverage:** tooltip/help content filled out across remaining generation controls.
            - **PNG/A1111 metadata interoperability:** generation parameters are embedded in PNG text chunks and can be reloaded back into generation settings.
            - **Queue page enabled:** running/pending queue visibility with interrupt and remove actions.
            - **Linux inpainting responsiveness fix:** removed per-stroke mask uploads in canvas auto-commit path to eliminate brush lag regressions.
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
